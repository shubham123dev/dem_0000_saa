name: main-validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-validation-${{ github.ref }}-${{ matrix.python-version }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    env:
      WORKPLACE_DATABASE_URL: sqlite+aiosqlite:///./ci-workplace-sandbox.db
      WORKPLACE_ENVIRONMENT: sandbox
      WORKPLACE_ENABLE_RAW_MOCK_API: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile application and tests
        run: python -m compileall -q app tests alembic

      - name: Upgrade fresh database twice
        run: |
          rm -f ci-workplace-sandbox.db
          python -m alembic upgrade head
          python -m alembic upgrade head

      - name: Seed database twice
        run: |
          python -m app.db.seed
          python -m app.db.seed

      - name: Run test suite
        run: |
          set +e
          python -m pytest -q > pytest-output-${{ matrix.python-version }}.txt 2>&1
          pytest_exit_code=$?
          cat pytest-output-${{ matrix.python-version }}.txt
          exit $pytest_exit_code

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-python-${{ matrix.python-version }}
          path: pytest-output-${{ matrix.python-version }}.txt
          if-no-files-found: warn
