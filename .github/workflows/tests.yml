name: main-validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    env:
      WORKPLACE_DATABASE_URL: sqlite+aiosqlite:///./ci-workplace-sandbox.db
      WORKPLACE_ENVIRONMENT: sandbox
      WORKPLACE_ENABLE_RAW_MOCK_API: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile application and tests
        run: python -m compileall -q app tests alembic scripts

      - name: Validate frontend and phase contracts
        run: |
          python scripts/validate_frontend_contracts.py --repo .
          python scripts/validate_angular_phase1.py --repo .
          python scripts/validate_angular_phase2.py --repo .
          python scripts/validate_angular_phase3.py --repo .
          python scripts/validate_angular_phase4.py --repo .
          python scripts/validate_phase5_agent_runs.py --repo .
          python scripts/validate_phase6_action_control_plane.py --repo .

      - name: Upgrade fresh database twice
        run: |
          rm -f ci-workplace-sandbox.db
          python -m alembic upgrade head
          python -m alembic upgrade head
          python -m alembic current

      - name: Seed database twice
        run: |
          python -m app.db.seed
          python -m app.db.seed

      - name: Run backend test suite
        run: |
          set +e
          python -m pytest -q > pytest-output-${{ matrix.python-version }}.txt 2>&1
          pytest_exit_code=$?
          cat pytest-output-${{ matrix.python-version }}.txt
          exit $pytest_exit_code

      - name: Upload backend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-python-${{ matrix.python-version }}
          path: pytest-output-${{ matrix.python-version }}.txt
          if-no-files-found: warn

  frontend:
    name: Frontend / Angular and Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          set +e
          node --version > npm-ci-output.txt
          npm --version >> npm-ci-output.txt
          npm ci --verbose >> npm-ci-output.txt 2>&1
          npm_exit_code=$?
          cat npm-ci-output.txt
          exit $npm_exit_code

      - name: Upload npm install diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-output
          path: frontend/npm-ci-output.txt
          if-no-files-found: warn

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Validate Phase 6 frontend
        working-directory: frontend
        run: npm run validate:phase6

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
