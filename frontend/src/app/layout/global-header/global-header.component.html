<header class="global-header"><div class="global-header__account">@if (compact) {<button type="button" class="header-icon-button" aria-label="Open navigation" (click)="navigationPressed.emit()">☰</button>}<img class="brand-mark" src="sara-ai-orb.svg" alt="" aria-hidden="true" /><div class="brand-copy"><strong>SARA AI</strong><span>RAG ENGINE ONLINE</span></div></div><div class="global-header__center"><span class="section-title">{{ sectionTitle }}</span><nav aria-label="Global actions"><button type="button" class="header-action" aria-label="Ask SARA" [attr.aria-pressed]="assistantOpen" (click)="assistantPressed.emit()"><span aria-hidden="true">✦</span> Ask SARA</button><div class="header-popover-anchor header-support"><button type="button" class="header-action" [attr.aria-expanded]="supportOpen()" (click)="toggleSupport()"><span aria-hidden="true">?</span> Support</button>@if (supportOpen()) {<div class="header-popover" role="dialog" aria-label="Support information"><strong>Need help?</strong><p>Use SARA for workplace questions. Approval and execution controls remain backend governed.</p></div>}</div><div class="header-popover-anchor"><button type="button" class="account-button" aria-label="Open account preferences" [attr.aria-expanded]="accountOpen()" (click)="toggleAccount()">S</button>@if (accountOpen()) {<div class="header-popover header-popover--account" role="dialog" aria-label="Account preferences"><strong>Sandbox administrator</strong><span>Theme preference</span><app-ui-theme-toggle /></div>}</div></nav></div><div class="global-header__assistant" [class.global-header__assistant--hidden]="!assistantOpen"><strong>Ask SARA</strong><span>Resumable activity</span></div></header>
